name: Distribute Android (Firebase)

# Fires on every SemVer release tag (e.g. v0.1.0) and can also be run manually.
# Builds a release APK and ships it to Firebase App Distribution testers.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name, e.g. 0.1.0'
        required: true

permissions:
  contents: read

jobs:
  distribute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"   # strip the leading "v" from the tag
          fi
          echo "name=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building Tanuki $VERSION (versionCode ${{ github.run_number }})"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore (optional)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
            echo "ANDROID_KEYSTORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
            echo "Using release keystore."
          else
            echo "No ANDROID_KEYSTORE_BASE64 secret — release will be debug-signed."
          fi

      - name: Write Firebase service account
        env:
          SA_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ANDROID_B64 }}
          SA_RAW: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ANDROID }}
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/firebase-sa.json"
          TRY="$RUNNER_TEMP/sa-try.json"
          : > "$OUT"
          # Accept whichever secret is a real service-account key (contains "private_key").
          # Prefer the base64 secret, but a stale/wrong one won't block the raw JSON secret.
          if [ -n "${SA_B64:-}" ]; then
            echo "$SA_B64" | base64 --decode > "$TRY" 2>/dev/null || true
            grep -q '"private_key"' "$TRY" 2>/dev/null && cp "$TRY" "$OUT" || true
          fi
          if [ ! -s "$OUT" ] && [ -n "${SA_RAW:-}" ]; then
            printf '%s' "$SA_RAW" > "$TRY"
            grep -q '"private_key"' "$TRY" 2>/dev/null && cp "$TRY" "$OUT" || true
          fi
          if [ ! -s "$OUT" ]; then
            echo "::error::No valid service-account key in FIREBASE_SERVICE_ACCOUNT_ANDROID_B64 / FIREBASE_SERVICE_ACCOUNT_ANDROID (must be JSON containing \"private_key\" — not google-services.json). Generate one in Firebase Console → Project settings → Service accounts → Generate new private key."
            exit 1
          fi
          echo "FIREBASE_SERVICE_ACCOUNT_FILE=$OUT" >> "$GITHUB_ENV"
          echo "Service account OK ($(wc -c < "$OUT") bytes)."

      - name: Build & distribute
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          FIREBASE_TESTER_GROUPS: ${{ vars.FIREBASE_TESTER_GROUPS || 'internal-testers' }}
          FIREBASE_RELEASE_NOTES: "Tanuki ${{ steps.version.outputs.name }} (build ${{ github.run_number }})"
        run: |
          ./gradlew :composeApp:assembleRelease :composeApp:appDistributionUploadRelease \
            -Ptanuki.versionName=${{ steps.version.outputs.name }} \
            -Ptanuki.versionCode=${{ github.run_number }} \
            -PfirebaseAppId="$FIREBASE_APP_ID" \
            -PfirebaseServiceCredentialsFile="$FIREBASE_SERVICE_ACCOUNT_FILE" \
            -PfirebaseTesterGroups="$FIREBASE_TESTER_GROUPS" \
            -PfirebaseReleaseNotes="$FIREBASE_RELEASE_NOTES"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tanuki-${{ steps.version.outputs.name }}-release
          path: composeApp/build/outputs/apk/release/*.apk
          if-no-files-found: error
